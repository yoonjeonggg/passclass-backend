name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Clean leftover Firebase config
        run: rm -f src/main/resources/firebase/passclass-494fe-firebase-adminsdk-fbsvc-511a589c3b.json

      - name: Build with Gradle (skip tests)
        run: bash gradlew clean bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/passclass:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/passclass:latest
            docker stop passclass || true
            docker rm passclass || true
            docker run -d \
              --name passclass \
              --restart unless-stopped \
              --network host \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              -e "NICEPAY_CLIENT_KEY=${{ secrets.NICEPAY_CLIENT_KEY }}" \
              -e "NICEPAY_SECRET_KEY=${{ secrets.NICEPAY_SECRET_KEY }}" \
              -v /home/ec2-user/passclass/firebase.json:/firebase/passclass-494fe-firebase-adminsdk-fbsvc-511a589c3b.json:ro \
              ghcr.io/${{ github.repository_owner }}/passclass:latest
            echo "Deployed successfully"
