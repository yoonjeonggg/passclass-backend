name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Inject Firebase config
        run: |
          mkdir -p src/main/resources/firebase
          printf '%s' "${{ secrets.FIREBASE_CONFIG_JSON }}" | base64 -d > src/main/resources/firebase/passclass-494fe-firebase-adminsdk-fbsvc-511a589c3b.json

      - name: Build with Gradle (skip tests)
        run: bash gradlew bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/passclass:latest

      - name: Deploy Docker container
        run: |
          docker stop passclass || true
          docker rm passclass || true

          docker run -d \
            --name passclass \
            --restart unless-stopped \
            --network host \
            -e SPRING_PROFILES_ACTIVE=prod \
            -e "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            -e "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            ghcr.io/${{ github.repository_owner }}/passclass:latest

          echo "Deployed successfully"
