spring.application.name=PassClass

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.jwt.secret=test_secret_key_for_unit_testing_purposes_only

firebase.configuration-file=firebase/test.json
firebase.bucket=test-bucket

spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.from=noreply@passclass.com
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

scheduler.cleanup.email-verification.cron=0 0 * * * *
scheduler.cleanup.refresh-token.cron=0 0 3 * * *
scheduler.cleanup.notification.cron=0 0 4 * * 0
scheduler.statistics.cron=0 30 2 * * *

rate-limit.requests-per-minute=100
rate-limit.auth-requests-per-minute=10

discord.webhooks.new-lectures=
discord.webhooks.new-users=
discord.webhooks.errors=
discord.webhooks.events=

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
management.health.mail.enabled=false
info.app.name=PassClass
info.app.version=1.0.0
info.app.description=자격증 인강 사이트
