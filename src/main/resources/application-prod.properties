server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/passclass
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jwt.secret=${JWT_SECRET}

firebase.configuration-file=file:/firebase/passclass-494fe-firebase-adminsdk-fbsvc-511a589c3b.json
firebase.bucket=passclass-494fe.firebasestorage.app

# Scheduler
scheduler.cleanup.email-verification.cron=0 0 * * * *
scheduler.cleanup.refresh-token.cron=0 0 3 * * *
scheduler.cleanup.notification.cron=0 0 4 * * 0
scheduler.statistics.cron=0 30 2 * * *

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Rate Limiting (Vercel 프록시 환경 - 단일 IP로 몰리므로 높게 설정)
rate-limit.requests-per-minute=500
rate-limit.auth-requests-per-minute=100

# Compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
